---

- name: Create mqtt config folder
  ansible.builtin.file:
    path: "{{ dfld_dir }}/mqtt/config"
    owner: "{{ dfld_user_info.uid }}"
    group: "{{ dfld_user_info.group }}"
    state: directory
    mode: '0755'

- name: Create mqtt config file
  ansible.builtin.template:
    src: "{{ playbook_dir }}/templates/mqtt/mosquitto.conf.j2"
    dest: "{{ dfld_dir }}/mqtt/config/mosquitto.conf"
    owner: "{{ dfld_user_info.uid }}"
    group: "{{ dfld_user_info.group }}"
    mode: '0644'

- name: Create certs folder for client certificates
  ansible.builtin.file:
    path: "{{ dfld_dir }}/certs"
    owner: "{{ dfld_user_info.uid }}"
    group: "{{ dfld_user_info.group }}"
    state: directory
    mode: '0755'

- name: Check if client-certs.tgz exists in playbook directory
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/client-certs.tgz"
  register: client_certs_archive
  delegate_to: localhost
  become: false

- name: Extract client certificates if archive exists
  # tgz enthaelt historisch ein "mqtt-certs/"-Top-Verzeichnis, die Code-
  # Pfade erwarten aber "certs/". --strip-components=1 entfernt das Prefix
  # beim Entpacken, files landen direkt in {{ dfld_dir }}/certs/.
  ansible.builtin.unarchive:
    src: "{{ playbook_dir }}/client-certs.tgz"
    dest: "{{ dfld_dir }}/certs"
    owner: "{{ dfld_user_info.uid }}"
    group: "{{ dfld_user_info.group }}"
    mode: '0644'
    remote_src: false
    extra_opts: ['--strip-components=1']
  when: client_certs_archive.stat.exists

- name: Set secure permissions for private key
  ansible.builtin.file:
    path: "{{ dfld_dir }}/certs/client-key.pem"
    mode: '0600'
  when: client_certs_archive.stat.exists

- name: Check if dfld-client-certs.tgz exists at /home/dfld on the target
  # Operator scp't das Archiv vor dem Ansible-Lauf nach /home/dfld auf
  # die Pi — Datei mit privaten Schluesseln gehoert nicht ins Repo.
  # Pflicht-Schritt fuer alle Stationen die Daten an mqtt.dfld.de oder
  # ingest.dfld.de uebertragen (siehe README "mTLS-Zertifikate").
  ansible.builtin.stat:
    path: /home/dfld/dfld-client-certs.tgz
  register: target_dfld_client_certs

- name: Extract dfld-client-certs.tgz into /opt/dfld/certs
  # Top-Verzeichnis im tgz wird gestripped damit die files direkt in
  # certs/ landen statt in certs/dfld-client-certs/.
  ansible.builtin.unarchive:
    src: /home/dfld/dfld-client-certs.tgz
    dest: "{{ dfld_dir }}/certs"
    owner: "{{ dfld_user_info.uid }}"
    group: "{{ dfld_user_info.group }}"
    remote_src: true
    extra_opts: ['--strip-components=1']
  when: target_dfld_client_certs.stat.exists

- name: Migrate legacy /opt/dfld/mqtt-certs -> /opt/dfld/certs (one-shot Umzug)
  # Pi-Bestand vor dem Umbenennen hatte das Verzeichnis als "mqtt-certs".
  # Idempotent durch creates-Marker (laeuft nur wenn certs/ leer ist).
  ansible.builtin.shell: |
    if [ -d {{ dfld_dir }}/mqtt-certs ]; then
      cp -a {{ dfld_dir }}/mqtt-certs/. {{ dfld_dir }}/certs/
      rm -rf {{ dfld_dir }}/mqtt-certs
    fi
  args:
    creates: "{{ dfld_dir }}/certs/client-cert.pem"
