---

- name: Update and upgrade apt packages
  become: true
  ansible.builtin.apt:
    upgrade: true
    update_cache: true
    cache_valid_time: 86400 # one day

- name: Install required packages
  become: true
  ansible.builtin.apt:
    pkg:
      - python3
      - python3-pip
      - netcat-openbsd
      - jq
      - yq
      # Fuer dfld-config TUI (Bash + whiptail). Locale C.UTF-8 ist via
      # glibc immer da, daher kein locales-Paket noetig.
      - whiptail
      # Fuer dfld-status (mqttCount-Probes via mosquitto_sub) und als
      # CLI-Ersatz fuer den fruher containerisierten mqtt-x-Debugger.
      - mosquitto-clients
    state: present

- name: Get /boot/firmware/cmdline.txt
  ansible.builtin.slurp:
    path: /boot/firmware/cmdline.txt
  register: cmdline_content

- name: Remove existing cgroup parameters from /boot/firmware/cmdline.txt
  ansible.builtin.set_fact:
    cmdline_line_ohne_cgroup: "{{ cmdline_content.content | b64decode | regex_replace('(\\s*' ~ cgroup_praefix ~ '[^\\s]+)+', '') }}"

- name: Insert wanted cgroup parameters into /boot/firmware/cmdline.txt
  ansible.builtin.set_fact:
    cmdline_line: "{{ cmdline_line_ohne_cgroup | trim }} {{ gewuenschte_cgroup_params | join(' ') }}"

- name: Write new cmdline.txt
  ansible.builtin.copy:
    content: "{{ cmdline_line | trim }}"
    dest: /boot/firmware/cmdline.txt
    owner: root
    group: root
    mode: '0644'
  register: cmdline_txt_changed

- name: Install lazydocker (latest version)
  shell: |
    set -e
    DPKG_ARCH=$(dpkg --print-architecture)
    case $DPKG_ARCH in
      amd64) ARCH="x86_64" ;;
      arm64) ARCH="arm64" ;;
      armhf) ARCH="armv7" ;;
      armel) ARCH="armv6" ;;
      i386) ARCH="x86" ;;
      *) echo "Unsupported: $DPKG_ARCH"; exit 1 ;;
    esac
    LATEST=$(curl -s https://api.github.com/repos/jesseduffield/lazydocker/releases/latest | jq -r .tag_name)
    URL="https://github.com/jesseduffield/lazydocker/releases/download/${LATEST}/lazydocker_${LATEST#v}_Linux_${ARCH}.tar.gz"
    echo "Downloading: $URL"
    curl -fsSL "$URL" | tar xz -C /usr/local/bin lazydocker
    chmod +x /usr/local/bin/lazydocker
  args:
    creates: /usr/local/bin/lazydocker

- name: Set reboot required if cmdline.txt changed
  ansible.builtin.file:
    name: /var/run/reboot-required
    owner: root
    group: root
    mode: '0644'
    state: touch
  when: cmdline_txt_changed.changed

- name: Check if reboot is needed
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: check_reboot
