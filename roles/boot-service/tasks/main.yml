---
# Role: boot-service
# Speichert die Basis-Konfiguration und erstellt den Systemd-Service für den Boot-Prozess

- name: Ensure config directory exists
  ansible.builtin.file:
    path: "{{ dfld_dir }}/config"
    owner: "{{ dfld_user_info.uid }}"
    group: "{{ dfld_user_info.group }}"
    state: directory
    mode: '0755'

- name: Validate deployment mode
  ansible.builtin.assert:
    that:
      - deployment_mode is defined
      - deployment_mode in ['mini', 'full']
    fail_msg: "deployment_mode must be set to 'mini' or 'full' in the playbook"

- name: Save all installation variables to base config
  ansible.builtin.copy:
    content: |
      ---
      # Base configuration saved during initial installation
      # Generated: {{ ansible_date_time.iso8601 }}
      # DO NOT EDIT - this file is managed by the installation playbook
      # Station-specific parameters should be configured in /boot/dfld.yml
      
      {{ vars | to_nice_yaml }}
    dest: "{{ dfld_dir }}/config/base_config.yml"
    owner: "{{ dfld_user_info.uid }}"
    group: "{{ dfld_user_info.group }}"
    mode: '0600'

- name: Copy boot playbook to target
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/boot.yml"
    dest: "{{ dfld_dir }}/boot.yml"
    owner: "{{ dfld_user_info.uid }}"
    group: "{{ dfld_user_info.group }}"
    mode: '0644'

- name: Copy required templates to target
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/templates/"
    dest: "{{ dfld_dir }}/templates/"
    owner: "{{ dfld_user_info.uid }}"
    group: "{{ dfld_user_info.group }}"
    mode: '0644'
    directory_mode: '0755'

- name: Create systemd service for DFLD boot
  ansible.builtin.template:
    src: "{{ playbook_dir }}/templates/systemd/dfld-boot.service.j2"
    dest: /etc/systemd/system/dfld-boot.service
    owner: root
    group: root
    mode: '0644'
  notify: Reload systemd

- name: Enable DFLD boot service
  ansible.builtin.systemd:
    name: dfld-boot
    enabled: yes
    daemon_reload: yes
