all:
  vars:
    # fqdn oder ip adresse, unter der die homepage erreichbar ist
    # default ist die von ansible automatische fqdn der messbox
    messstation_fqdn: "{{ ansible_facts['hostname'] }}"
    # liste von zusätzlichen fqdns oder ips, unter der die homepage erreichbar sein soll
    user_allowed_homepage_hosts:
      - ""
      - ""
      - ""

    station_lon: ""
    station_lat: ""
    station_alt: ""
    station_city: ""

    dfld_region: ""
    dfld_station: ""
    dfld_cksum: ""
    dfld_liveview: ""
    dfld_legacy: ""

    # Datenuebertragung — zwei unabhaengige Pfade an mqtt.dfld.de / ingest.dfld.de.
    # Siehe docs/backfill-architecture.md im dfld_server-Repo.
    #
    # dfld_live_enabled: Live-MQTT-Bridge (mqtt2mqtt) zum DFLD-Server.
    #                    true  = Echtzeit-Stream (1 Hz), braucht stabiles Netz
    #                    false = kein Live, nur Batch (siehe naechstes Feld)
    #
    # dfld_backfill_interval: HTTPS-Batch-Upload (tsdb2http) an ingest.dfld.de.
    #                    hourly = stuendlicher Push (LTE-bandbreitensparend
    #                             oder als Reconciliation neben Live)
    #                    daily  = einmal pro Tag (LTE-Volumen-Cap)
    #                    off    = Container nicht rendern
    dfld_live_enabled: true
    dfld_backfill_interval: "hourly"
    
    
    dfld_user: "dfld"
    dfld_group: "dfld"

    dfld_dir: "/opt/dfld"
    conf_dir: "/boot/firmware"

    grafana_username: "{{ dfld_user }}"
    grafana_password: "{{ dfld_user }}"

    influxdb_username: "{{ dfld_user }}"
    influxdb_password: "{{ dfld_user }}"

    postgres_username: "{{ dfld_user }}"
    postgres_password: "{{ dfld_user }}"
    postgres_database: "dfld"

    pgadmin_email: "{{ dfld_user }}@dfld.de"
    pgadmin_password: "{{ dfld_user }}"

    #
    # ansible part
    #
    ansible_python_interpreter: /usr/bin/python3
    ansible_sudo_pass: "{{ dfld_user }}"
    ansible_user: "{{ dfld_user }}"
    ansible_ssh_pass: "{{ dfld_user }}"
