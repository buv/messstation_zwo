---

- name: Create systemd service to apply network configuration on boot
  ansible.builtin.copy:
    dest: /etc/systemd/system/dfld-network-config.service
    content: |
      [Unit]
      Description=Apply network configuration from boot partition
      Before=network.target

      [Service]
      Type=oneshot
      ExecStart=/bin/bash -c 'test -f {{ conf_dir }}/network-config && rm -f /etc/netplan/90-NM-*.yaml && cp {{ conf_dir }}/network-config /etc/netplan/50-network-config.yaml && chmod 600 /etc/netplan/50-network-config.yaml && netplan apply'

      [Install]
      WantedBy=multi-user.target
    owner: root
    group: root
    mode: '0644'

- name: Enable network config service
  ansible.builtin.systemd:
    name: dfld-network-config.service
    enabled: true
    daemon_reload: true

- name: Install iw package for WLAN power management control
  become: true
  ansible.builtin.apt:
    pkg:
      - iw
    state: present

- name: Create systemd service to disable WLAN power save mode
  ansible.builtin.copy:
    dest: /etc/systemd/system/dfld-wlan-power-save-off.service
    content: |
      [Unit]
      Description=Disable WLAN power save mode for connection stability
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/usr/sbin/iw dev wlan0 set power_save off
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target
    owner: root
    group: root
    mode: '0644'

- name: Enable WLAN power save off service
  ansible.builtin.systemd:
    name: dfld-wlan-power-save-off.service
    enabled: true
    daemon_reload: true

# BCM43430 (Pi Zero 2W) hat fehlerhafte Firmware für mehrere WLAN-Features,
# die mit modernen APs (WPA2/WPA3-Mixed-Mode, z.B. FRITZ!Box 6490) zu
# Verbindungsabbrüchen führen. Die Optionen sind mittlerweile auch der
# empfohlene Default in Raspberry Pi OS und Home Assistant OS.
# Quellen: raspberrypi/firmware#1973, RPi-Distro/firmware-nonfree#23,
#          home-assistant/operating-system PR#4056
- name: Configure brcmfmac kernel module for WLAN stability
  ansible.builtin.copy:
    dest: /etc/modprobe.d/brcmfmac.conf
    content: |
      # roamoff=1         – kein aktives AP-Roaming (sinnvoll für stationäre Geräte)
      # feature_disable=0x282000 deaktiviert:
      #   0x002000 FWSUP  – 4-Way-Handshake-Offloading; fällt auf wpa_supplicant
      #                     (Software) zurück, zuverlässiger als Hardware-Impl.
      #   0x080000 SAE    – WPA3-Authentifizierung, inkompatibel mit manchen APs
      #   0x200000 OBSS   – WLAN-Kanal-Scanning (verursacht Verbindungsunterbrechungen)
      options brcmfmac roamoff=1 feature_disable=0x282000
    owner: root
    group: root
    mode: '0644'
